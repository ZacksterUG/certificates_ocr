version: '3.8'

services:
  # Liquibase migrations
  migrations:
    build:
      context: .
      dockerfile: db/Dockerfile
    command: --changeLogFile=changelog.xml --url=jdbc:postgresql://postgres:5432/certificates --username=postgres --password=postgres update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: certificates
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d certificates"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  rabbitmq_data:
  postgres_data:
  ocr_uploads:

networks:
  app_network:
    driver: bridge
