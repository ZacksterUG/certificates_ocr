version: '3.8'

services:
  # OCR Microservice
  ocr-service:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    container_name: ocr-service
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: certificates
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      OCR_QUEUE: ocr_tasks
      LLM_QUEUE: llm_tasks
      MODEL_PATH: /app/models/PaddleOCR-VL-1.5
      MODEL_NAME: PaddlePaddle/PaddleOCR-VL-1.5
      DEVICE: cpu
      MAX_NEW_TOKENS: "512"
      PREFETCH_COUNT: "1"
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ocr_uploads:/tmp/ocr_uploads
      - ./datasets:/app/datasets:ro
      - ./models:/app/models:ro

  # LLM Service
  llm-service:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: llm-service
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: certificates
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LLM_QUEUE: llm_tasks
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_TIMEOUT: "120"
      PREFETCH_COUNT: "1"
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Liquibase migrations
  migrations:
    build:
      context: .
      dockerfile: db/Dockerfile
    command: --changeLogFile=changelog.xml --url=jdbc:postgresql://postgres:5432/certificates --username=postgres --password=postgres update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: certificates
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d certificates"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:
  ocr_uploads:

networks:
  app_network:
    driver: bridge
